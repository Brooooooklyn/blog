<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Page Not Found | Moonglade</title>
<script>(function(){var t=localStorage.getItem('theme');if(t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.classList.add('dark')}})()</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #fafafa; --fg: #171717; --muted: #a3a3a3; --border: #e5e5e5;
    --accent: #6366f1; --glow: #6366f118;
  }
  .dark {
    --bg: #0a0a0a; --fg: #f5f5f5; --muted: #525252; --border: #1e1e1e;
    --accent: #818cf8; --glow: #818cf812;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--fg);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  body::before {
    content: ""; position: fixed; inset: 0; z-index: 0; opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
  }
  .dark body::before { opacity: 0.06; }
  .orb {
    position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.12; z-index: 0;
    animation: float 20s ease-in-out infinite;
  }
  .dark .orb { opacity: 0.08; }
  .orb-1 { width: 500px; height: 500px; background: var(--accent); top: -150px; right: -100px; }
  .orb-2 { width: 400px; height: 400px; background: var(--accent); bottom: -120px; left: -80px; animation-delay: -7s; animation-duration: 25s; }
  .orb-3 { width: 300px; height: 300px; background: var(--accent); top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -14s; animation-duration: 30s; opacity: 0.06; }
  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(30px, -40px) scale(1.05); }
    50% { transform: translate(-20px, 20px) scale(0.95); }
    75% { transform: translate(15px, 30px) scale(1.02); }
  }
  .container { text-align: center; padding: 2rem; position: relative; z-index: 1; animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  .status-wrap { position: relative; display: inline-block; margin-bottom: 1.5rem; }
  .status {
    font-size: clamp(7rem, 20vw, 12rem); font-weight: 900; line-height: 1; letter-spacing: -0.06em;
    color: transparent;
    background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent), var(--fg) 30%));
    -webkit-background-clip: text; background-clip: text;
  }
  .status-ghost {
    position: absolute; inset: 0;
    font-size: clamp(7rem, 20vw, 12rem); font-weight: 900; line-height: 1; letter-spacing: -0.06em;
    color: transparent; -webkit-text-stroke: 1px var(--accent);
    opacity: 0.15; filter: blur(2px); animation: drift 6s ease-in-out infinite alternate;
  }
  @keyframes drift { from { transform: translate(-3px, -2px); } to { transform: translate(3px, 2px); } }
  .title { font-size: 1.35rem; font-weight: 600; margin-top: 0.25rem; letter-spacing: -0.01em; }
  .message { color: var(--muted); margin-top: 0.75rem; font-size: 1rem; line-height: 1.7; max-width: 380px; margin-left: auto; margin-right: auto; }
  .line { width: 64px; height: 2px; margin: 2.5rem auto; background: linear-gradient(90deg, transparent, var(--accent), transparent); border-radius: 1px; position: relative; overflow: hidden; }
  .line::after { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, transparent 0%, white 50%, transparent 100%); animation: shimmer 3s ease-in-out infinite; opacity: 0.3; }
  @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
  .home {
    display: inline-flex; align-items: center; gap: 0.5rem;
    color: var(--fg); text-decoration: none; font-size: 0.875rem; font-weight: 500;
    padding: 0.7rem 1.6rem;
    background: color-mix(in srgb, var(--accent) 8%, transparent);
    border: 1px solid color-mix(in srgb, var(--accent) 20%, transparent);
    border-radius: 9999px; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); backdrop-filter: blur(8px);
  }
  .home:hover { background: color-mix(in srgb, var(--accent) 15%, transparent); border-color: color-mix(in srgb, var(--accent) 40%, transparent); transform: translateY(-2px); box-shadow: 0 8px 30px var(--glow); }
  .home svg { width: 16px; height: 16px; opacity: 0.7; transition: opacity 0.2s; }
  .home:hover svg { opacity: 1; }
  .grid-bg {
    position: fixed; inset: 0; z-index: 0; opacity: 0.025;
    background-size: 60px 60px;
    background-image: linear-gradient(var(--fg) 1px, transparent 1px), linear-gradient(90deg, var(--fg) 1px, transparent 1px);
    mask-image: radial-gradient(ellipse at center, black 0%, transparent 70%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 0%, transparent 70%);
  }
  .dark .grid-bg { opacity: 0.04; }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="container">
  <div class="status-wrap">
    <div class="status-ghost">404</div>
    <div class="status">404</div>
  </div>
  <h1 class="title">Page Not Found</h1>
  <p class="message">The page you&rsquo;re looking for doesn&rsquo;t exist, or it wandered off somewhere it shouldn&rsquo;t have.</p>
  <div class="line"></div>
  <a href="/" class="home">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
    </svg>
    Back to Home
  </a>
</div>
</body>
</html>
